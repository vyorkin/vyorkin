<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240">
  <defs>
    <style>
      .t {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 26px;
        font-weight: 400;
        letter-spacing: 2px;
        text-anchor: middle;
      }
      .main { fill: #cc0000; filter: url(#glow); }
      .g1   { fill: #8b0000; }
      .g2   { fill: #b30000; }
      .g3   { fill: #ff2200; }
      .g4   { fill: #990000; }
      .g5   { fill: #7a0000; }
      .g6   { fill: #ff4400; }
      .g7   { fill: #660000; }

      .wrap { animation: flicker 1.8s infinite steps(1); }
      .g1{opacity:0;animation:ga 1.1s infinite steps(1) 0.00s;}
      .g2{opacity:0;animation:gb 1.7s infinite steps(1) 0.13s;}
      .g3{opacity:0;animation:gc 0.9s infinite steps(1) 0.27s;}
      .g4{opacity:0;animation:gd 1.4s infinite steps(1) 0.07s;}
      .g5{opacity:0;animation:ge 1.0s infinite steps(1) 0.40s;}
      .g6{opacity:0;animation:gf 2.0s infinite steps(1) 0.55s;}
      .g7{opacity:0;animation:gg 0.7s infinite steps(1) 0.20s;}

      /* 12s cycle: L1 types 0-22%, L2 22-48%, L3 48-74%, L4 74-94%, hold, reset at 97% */
      .l1 { clip-path:inset(0 100% 0 0); animation: type1 12s infinite steps(30); }
      .l2 { clip-path:inset(0 100% 0 0); animation: type2 12s infinite steps(42); }
      .l3 { clip-path:inset(0 100% 0 0); animation: type3 12s infinite steps(42); }
      .l4 { clip-path:inset(0 100% 0 0); animation: type4 12s infinite steps(42); }

      @keyframes type1 {
        0%            { clip-path:inset(0 100% 0 0); }
        22%           { clip-path:inset(0 0% 0 0); }
        95%           { clip-path:inset(0 0% 0 0); }
        97%,100%      { clip-path:inset(0 100% 0 0); }
      }
      @keyframes type2 {
        0%,21%        { clip-path:inset(0 100% 0 0); }
        48%           { clip-path:inset(0 0% 0 0); }
        95%           { clip-path:inset(0 0% 0 0); }
        97%,100%      { clip-path:inset(0 100% 0 0); }
      }
      @keyframes type3 {
        0%,47%        { clip-path:inset(0 100% 0 0); }
        74%           { clip-path:inset(0 0% 0 0); }
        95%           { clip-path:inset(0 0% 0 0); }
        97%,100%      { clip-path:inset(0 100% 0 0); }
      }
      @keyframes type4 {
        0%,73%        { clip-path:inset(0 100% 0 0); }
        94%           { clip-path:inset(0 0% 0 0); }
        95%           { clip-path:inset(0 0% 0 0); }
        97%,100%      { clip-path:inset(0 100% 0 0); }
      }

      /* cursors — visible only while their line is typing */
      .cur-blink { animation: blink 0.45s infinite steps(1); }
      @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }

      .cur1 { animation: curv1 12s infinite steps(1); }
      .cur2 { animation: curv2 12s infinite steps(1); }
      .cur3 { animation: curv3 12s infinite steps(1); }
      .cur4 { animation: curv4 12s infinite steps(1); }
      @keyframes curv1 { 0%{opacity:1;} 22%{opacity:0;} 100%{opacity:0;} }
      @keyframes curv2 { 0%,21%{opacity:0;} 22%{opacity:1;} 48%{opacity:0;} 100%{opacity:0;} }
      @keyframes curv3 { 0%,47%{opacity:0;} 48%{opacity:1;} 74%{opacity:0;} 100%{opacity:0;} }
      @keyframes curv4 { 0%,73%{opacity:0;} 74%{opacity:1;} 94%{opacity:0;} 100%{opacity:0;} }

      .b1{animation:bar1 1.1s infinite steps(1) 0.0s;}
      .b2{animation:bar2 1.6s infinite steps(1) 0.2s;}
      .b3{animation:bar3 0.9s infinite steps(1) 0.5s;}
      .b4{animation:bar4 1.3s infinite steps(1) 0.1s;}
      .b5{animation:bar5 0.8s infinite steps(1) 0.7s;}

      @keyframes flicker {
        0%,5%,7%,12%,14%,30%,32%,50%,52%,65%,67%,80%,82%,95%,97%,100%{opacity:1;}
        6%{opacity:0.15;} 13%{opacity:0.5;} 31%{opacity:0.05;}
        51%{opacity:0.4;} 66%{opacity:0.1;} 81%{opacity:0.6;} 96%{opacity:0.2;}
      }
      @keyframes ga {
        0%,60%,100%{opacity:0;transform:translate(0,0);clip-path:inset(100% 0 0 0);}
        61%{opacity:0.9;transform:translate(-8px,0);clip-path:inset(3% 0 82% 0);}
        63%{opacity:0.9;transform:translate(6px,3px);clip-path:inset(28% 0 52% 0);}
        65%{opacity:0.9;transform:translate(-4px,-2px);clip-path:inset(58% 0 22% 0);}
        67%{opacity:0.9;transform:translate(9px,1px);clip-path:inset(80% 0 3% 0);}
        69%{opacity:0;clip-path:inset(100% 0 0 0);}
      }
      @keyframes gb {
        0%,35%,100%{opacity:0;transform:translate(0,0);clip-path:inset(100% 0 0 0);}
        36%{opacity:0.85;transform:translate(9px,-3px);clip-path:inset(12% 0 68% 0);}
        38%{opacity:0.85;transform:translate(-6px,2px);clip-path:inset(45% 0 35% 0);}
        40%{opacity:0.85;transform:translate(5px,1px);clip-path:inset(72% 0 8% 0);}
        42%{opacity:0;clip-path:inset(100% 0 0 0);}
      }
      @keyframes gc {
        0%,80%,100%{opacity:0;transform:translate(0,0);clip-path:inset(100% 0 0 0);}
        81%{opacity:0.75;transform:translate(-10px,0);clip-path:inset(18% 0 72% 0);}
        83%{opacity:0.75;transform:translate(7px,-4px);clip-path:inset(52% 0 20% 0);}
        85%{opacity:0;clip-path:inset(100% 0 0 0);}
      }
      @keyframes gd {
        0%,50%,100%{opacity:0;transform:translate(0,0);clip-path:inset(100% 0 0 0);}
        51%{opacity:0.95;transform:translate(6px,4px);clip-path:inset(0% 0 88% 0);}
        52%{opacity:0.95;transform:translate(-8px,-2px);clip-path:inset(35% 0 44% 0);}
        54%{opacity:0.95;transform:translate(4px,0);clip-path:inset(68% 0 14% 0);}
        56%{opacity:0;clip-path:inset(100% 0 0 0);}
      }
      @keyframes ge {
        0%,20%,100%{opacity:0;transform:translate(0,0);clip-path:inset(100% 0 0 0);}
        21%{opacity:0.8;transform:translate(-5px,2px);clip-path:inset(8% 0 62% 0);}
        23%{opacity:0.8;transform:translate(10px,-3px);clip-path:inset(42% 0 38% 0);}
        25%{opacity:0.8;transform:translate(-3px,1px);clip-path:inset(76% 0 6% 0);}
        27%{opacity:0;clip-path:inset(100% 0 0 0);}
      }
      @keyframes gf {
        0%,72%,100%{opacity:0;transform:translate(0,0);clip-path:inset(100% 0 0 0);}
        73%{opacity:0.7;transform:translate(7px,2px);clip-path:inset(22% 0 60% 0);}
        75%{opacity:0.7;transform:translate(-9px,-1px);clip-path:inset(55% 0 25% 0);}
        77%{opacity:0;clip-path:inset(100% 0 0 0);}
      }
      @keyframes gg {
        0%,88%,100%{opacity:0;transform:translate(0,0);clip-path:inset(100% 0 0 0);}
        89%{opacity:0.9;transform:translate(-12px,0);clip-path:inset(5% 0 78% 0);}
        90%{opacity:0.9;transform:translate(8px,3px);clip-path:inset(60% 0 15% 0);}
        91%{opacity:0;clip-path:inset(100% 0 0 0);}
      }
      @keyframes bar1 {
        0%,55%,100%{opacity:0;} 56%{opacity:0.5;transform:translateY(0);}
        57%{opacity:0.5;transform:translateY(5px);} 58%{opacity:0;}
      }
      @keyframes bar2 {
        0%,25%,100%{opacity:0;} 26%{opacity:0.4;transform:translateY(-4px);}
        28%{opacity:0.4;transform:translateY(3px);} 30%{opacity:0;}
      }
      @keyframes bar3 {
        0%,70%,100%{opacity:0;} 71%{opacity:0.6;transform:translateX(-7px);} 72%{opacity:0;}
      }
      @keyframes bar4 {
        0%,42%,100%{opacity:0;} 43%{opacity:0.35;transform:translateY(2px);}
        44%{opacity:0.35;transform:translateY(-2px);} 46%{opacity:0;}
      }
      @keyframes bar5 {
        0%,85%,100%{opacity:0;} 86%{opacity:0.55;transform:translateX(10px);}
        87%{opacity:0.55;transform:translateX(-5px);} 88%{opacity:0;}
      }
    </style>

    <filter id="glow" x="-25%" y="-60%" width="150%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur stdDeviation="12" result="b2" in="SourceGraphic"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="3" width="900" height="1" fill="black"/>
    </pattern>
    <pattern id="hatch" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="8" y2="8" stroke="rgba(180,0,0,0.07)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="900" height="240" fill="#060000"/>
  <rect width="900" height="240" fill="url(#hatch)"/>

  <line x1="0" y1="44"  x2="900" y2="44"  stroke="rgba(160,0,0,0.07)" stroke-width="1"/>
  <line x1="0" y1="88"  x2="900" y2="88"  stroke="rgba(160,0,0,0.07)" stroke-width="1"/>
  <line x1="0" y1="132" x2="900" y2="132" stroke="rgba(160,0,0,0.07)" stroke-width="1"/>
  <line x1="0" y1="176" x2="900" y2="176" stroke="rgba(160,0,0,0.07)" stroke-width="1"/>
  <line x1="0" y1="220" x2="900" y2="220" stroke="rgba(160,0,0,0.07)" stroke-width="1"/>
  <line x1="90"  y1="0" x2="90"  y2="240" stroke="rgba(160,0,0,0.05)" stroke-width="1"/>
  <line x1="270" y1="0" x2="270" y2="240" stroke="rgba(160,0,0,0.05)" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="240" stroke="rgba(160,0,0,0.05)" stroke-width="1"/>
  <line x1="630" y1="0" x2="630" y2="240" stroke="rgba(160,0,0,0.05)" stroke-width="1"/>
  <line x1="810" y1="0" x2="810" y2="240" stroke="rgba(160,0,0,0.05)" stroke-width="1"/>

  <rect width="900" height="240" fill="url(#scan)" opacity="0.18"/>

  <rect class="b1" x="0" y="60"  width="900" height="8"  fill="rgba(180,0,0,0.16)"/>
  <rect class="b2" x="0" y="110" width="900" height="5"  fill="rgba(140,0,0,0.14)"/>
  <rect class="b3" x="0" y="155" width="900" height="12" fill="rgba(100,0,0,0.11)"/>
  <rect class="b4" x="0" y="88"  width="900" height="4"  fill="rgba(200,0,0,0.18)"/>
  <rect class="b5" x="0" y="195" width="900" height="6"  fill="rgba(160,0,0,0.14)"/>

  <!-- LINE 1 -->
  <g class="l1">
    <g class="wrap">
      <text class="t g7" x="450" y="68">В рот ебал я программировать</text>
      <text class="t g5" x="450" y="68">В рот ебал я программировать</text>
      <text class="t g4" x="450" y="68">В рот ебал я программировать</text>
      <text class="t g2" x="450" y="68">В рот ебал я программировать</text>
      <text class="t g1" x="450" y="68">В рот ебал я программировать</text>
      <text class="t g6" x="450" y="68">В рот ебал я программировать</text>
      <text class="t g3" x="450" y="68">В рот ебал я программировать</text>
      <text class="t main" x="450" y="68">В рот ебал я программировать</text>
    </g>
  </g>

  <!-- LINE 2 -->
  <g class="l2">
    <g class="wrap">
      <text class="t g7" x="450" y="108">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g5" x="450" y="108">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g4" x="450" y="108">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g2" x="450" y="108">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g1" x="450" y="108">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g6" x="450" y="108">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g3" x="450" y="108">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t main" x="450" y="108">Лучше спиздить, отнять, наебать и продать</text>
    </g>
  </g>

  <!-- LINE 3 -->
  <g class="l3">
    <g class="wrap">
      <text class="t g7" x="450" y="148">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g5" x="450" y="148">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g4" x="450" y="148">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g2" x="450" y="148">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g1" x="450" y="148">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g6" x="450" y="148">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g3" x="450" y="148">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t main" x="450" y="148">Лучше спиздить, отнять, наебать и продать</text>
    </g>
  </g>

  <!-- LINE 4 -->
  <g class="l4">
    <g class="wrap">
      <text class="t g7" x="450" y="188">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g5" x="450" y="188">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g4" x="450" y="188">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g2" x="450" y="188">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g1" x="450" y="188">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g6" x="450" y="188">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t g3" x="450" y="188">Лучше спиздить, отнять, наебать и продать</text>
      <text class="t main" x="450" y="188">Лучше спиздить, отнять, наебать и продать</text>
    </g>
  </g>

  <!-- cursors -->
  <g class="cur1"><rect class="cur-blink" x="678" y="46" width="13" height="26" fill="#cc0000"/></g>
  <g class="cur2"><rect class="cur-blink" x="840" y="86" width="13" height="26" fill="#cc0000"/></g>
  <g class="cur3"><rect class="cur-blink" x="840" y="126" width="13" height="26" fill="#cc0000"/></g>
  <g class="cur4"><rect class="cur-blink" x="840" y="166" width="13" height="26" fill="#cc0000"/></g>
</svg>
