<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      .t {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 74px;
        font-weight: 400;
        letter-spacing: 10px;
        text-anchor: middle;
      }
      .main  { fill: #ff1a1a; filter: url(#glow); }
      .g1    { fill: #ff6600; }
      .g2    { fill: #ff0040; }
      .g3    { fill: #ffcc00; }
      .g4    { fill: #ff0000; }
      .g5    { fill: #cc0000; }

      .wrap  { animation: flicker 2.5s infinite steps(1); }
      .g1    { opacity:0; animation: ga 1.8s infinite steps(1) 0.00s; }
      .g2    { opacity:0; animation: gb 2.1s infinite steps(1) 0.15s; }
      .g3    { opacity:0; animation: gc 1.5s infinite steps(1) 0.30s; }
      .g4    { opacity:0; animation: gd 2.4s infinite steps(1) 0.05s; }
      .g5    { opacity:0; animation: ge 1.3s infinite steps(1) 0.45s; }

      .bar1  { animation: bar1 1.8s infinite steps(1); }
      .bar2  { animation: bar2 2.2s infinite steps(1) 0.3s; }
      .bar3  { animation: bar3 1.4s infinite steps(1) 0.6s; }

      .accent { animation: lineflash 2s ease-in-out infinite; }
      .noise  { animation: noiseshift 0.4s infinite steps(1); }

      @keyframes flicker {
        0%,8%,10%,18%,20%,60%,62%,78%,80%,88%,90%,100% { opacity:1; }
        9%  { opacity:0.3; }
        19% { opacity:0.6; }
        61% { opacity:0.1; }
        79% { opacity:0.5; }
        89% { opacity:0.2; }
      }

      @keyframes ga {
        0%,70%,100% { opacity:0; transform:translate(0,0); clip-path:inset(100% 0 0 0); }
        71% { opacity:0.9; transform:translate(-6px,0); clip-path:inset(5% 0 80% 0); }
        73% { opacity:0.9; transform:translate(5px,2px); clip-path:inset(30% 0 55% 0); }
        75% { opacity:0.9; transform:translate(-3px,-1px); clip-path:inset(60% 0 25% 0); }
        77% { opacity:0.9; transform:translate(6px,0); clip-path:inset(80% 0 5% 0); }
        79% { opacity:0; clip-path:inset(100% 0 0 0); }
      }
      @keyframes gb {
        0%,40%,100% { opacity:0; transform:translate(0,0); clip-path:inset(100% 0 0 0); }
        41% { opacity:0.85; transform:translate(7px,-2px); clip-path:inset(15% 0 65% 0); }
        43% { opacity:0.85; transform:translate(-5px,1px); clip-path:inset(50% 0 30% 0); }
        45% { opacity:0.85; transform:translate(4px,2px); clip-path:inset(75% 0 8% 0); }
        47% { opacity:0; clip-path:inset(100% 0 0 0); }
      }
      @keyframes gc {
        0%,85%,100% { opacity:0; transform:translate(0,0); clip-path:inset(100% 0 0 0); }
        86% { opacity:0.7; transform:translate(-8px,0); clip-path:inset(20% 0 70% 0); }
        88% { opacity:0.7; transform:translate(6px,-3px); clip-path:inset(55% 0 20% 0); }
        90% { opacity:0; clip-path:inset(100% 0 0 0); }
      }
      @keyframes gd {
        0%,55%,100% { opacity:0; transform:translate(0,0); clip-path:inset(100% 0 0 0); }
        56% { opacity:0.95; transform:translate(5px,3px); clip-path:inset(0% 0 85% 0); }
        57% { opacity:0.95; transform:translate(-7px,-1px); clip-path:inset(40% 0 40% 0); }
        59% { opacity:0.95; transform:translate(3px,0); clip-path:inset(72% 0 12% 0); }
        61% { opacity:0; clip-path:inset(100% 0 0 0); }
      }
      @keyframes ge {
        0%,25%,100% { opacity:0; transform:translate(0,0); clip-path:inset(100% 0 0 0); }
        26% { opacity:0.8; transform:translate(-4px,2px); clip-path:inset(10% 0 60% 0); }
        28% { opacity:0.8; transform:translate(8px,-2px); clip-path:inset(45% 0 35% 0); }
        30% { opacity:0.8; transform:translate(-2px,1px); clip-path:inset(78% 0 6% 0); }
        32% { opacity:0; clip-path:inset(100% 0 0 0); }
      }

      @keyframes bar1 {
        0%,65%,100% { opacity:0; transform:translateY(0); }
        66% { opacity:0.6; transform:translateY(0px); }
        67% { opacity:0.6; transform:translateY(4px); }
        68% { opacity:0; }
      }
      @keyframes bar2 {
        0%,30%,100% { opacity:0; }
        31% { opacity:0.5; transform:translateY(-3px); }
        33% { opacity:0.5; transform:translateY(2px); }
        35% { opacity:0; }
      }
      @keyframes bar3 {
        0%,80%,100% { opacity:0; }
        81% { opacity:0.7; transform:translateX(-5px); }
        82% { opacity:0; }
      }

      @keyframes lineflash {
        0%,100% { opacity:0.3; }
        50% { opacity:1; }
      }
      @keyframes noiseshift {
        0%   { transform:translateX(0px);  opacity:0.03; }
        25%  { transform:translateX(-2px); opacity:0.06; }
        50%  { transform:translateX(1px);  opacity:0.03; }
        75%  { transform:translateX(3px);  opacity:0.05; }
        100% { transform:translateX(-1px); opacity:0.04; }
      }
    </style>

    <filter id="glow" x="-25%" y="-60%" width="150%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur stdDeviation="10" result="b2" in="SourceGraphic"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="3" width="900" height="1" fill="black"/>
    </pattern>
    <pattern id="hatch" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="6" y2="6" stroke="rgba(255,0,0,0.08)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- bg -->
  <rect width="900" height="220" fill="#0a0000"/>
  <rect width="900" height="220" fill="url(#hatch)"/>

  <!-- grid -->
  <line x1="0" y1="44" x2="900" y2="44" stroke="rgba(255,0,0,0.08)" stroke-width="1"/>
  <line x1="0" y1="88" x2="900" y2="88" stroke="rgba(255,0,0,0.08)" stroke-width="1"/>
  <line x1="0" y1="132" x2="900" y2="132" stroke="rgba(255,0,0,0.08)" stroke-width="1"/>
  <line x1="0" y1="176" x2="900" y2="176" stroke="rgba(255,0,0,0.08)" stroke-width="1"/>
  <line x1="90"  y1="0" x2="90"  y2="220" stroke="rgba(255,0,0,0.06)" stroke-width="1"/>
  <line x1="180" y1="0" x2="180" y2="220" stroke="rgba(255,0,0,0.06)" stroke-width="1"/>
  <line x1="270" y1="0" x2="270" y2="220" stroke="rgba(255,0,0,0.06)" stroke-width="1"/>
  <line x1="360" y1="0" x2="360" y2="220" stroke="rgba(255,0,0,0.06)" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="220" stroke="rgba(255,0,0,0.06)" stroke-width="1"/>
  <line x1="540" y1="0" x2="540" y2="220" stroke="rgba(255,0,0,0.06)" stroke-width="1"/>
  <line x1="630" y1="0" x2="630" y2="220" stroke="rgba(255,0,0,0.06)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="220" stroke="rgba(255,0,0,0.06)" stroke-width="1"/>
  <line x1="810" y1="0" x2="810" y2="220" stroke="rgba(255,0,0,0.06)" stroke-width="1"/>

  <!-- scanlines -->
  <rect width="900" height="220" fill="url(#scan)" opacity="0.18"/>

  <!-- glitch horizontal bars (background layer) -->
  <rect class="bar1" x="0" y="68" width="900" height="8" fill="rgba(255,0,0,0.15)"/>
  <rect class="bar2" x="0" y="120" width="900" height="5" fill="rgba(255,40,0,0.12)"/>
  <rect class="bar3" x="0" y="150" width="900" height="12" fill="rgba(200,0,0,0.1)"/>

  <!-- corners -->
  <polyline points="14,34 14,14 34,14"   fill="none" stroke="#ff1a1a" stroke-width="2"/>
  <polyline points="866,14 886,14 886,34" fill="none" stroke="#ff1a1a" stroke-width="2"/>
  <polyline points="14,186 14,206 34,206" fill="none" stroke="#ff1a1a" stroke-width="2"/>
  <polyline points="866,206 886,206 886,186" fill="none" stroke="#ff1a1a" stroke-width="2"/>

  <!-- inner corner ticks -->
  <line x1="50" y1="14" x2="70" y2="14" stroke="rgba(255,26,26,0.4)" stroke-width="1"/>
  <line x1="830" y1="14" x2="850" y2="14" stroke="rgba(255,26,26,0.4)" stroke-width="1"/>
  <line x1="50" y1="206" x2="70" y2="206" stroke="rgba(255,26,26,0.4)" stroke-width="1"/>
  <line x1="830" y1="206" x2="850" y2="206" stroke="rgba(255,26,26,0.4)" stroke-width="1"/>

  <!-- accent line -->
  <line class="accent" x1="220" y1="182" x2="680" y2="182" stroke="#ff1a1a" stroke-width="1" fill="none"/>

  <!-- text stack -->
  <g class="wrap">
    <text class="t g5" x="450" y="150">EBAT ARASAKU</text>
    <text class="t g4" x="450" y="150">EBAT ARASAKU</text>
    <text class="t g3" x="450" y="150">EBAT ARASAKU</text>
    <text class="t g2" x="450" y="150">EBAT ARASAKU</text>
    <text class="t g1" x="450" y="150">EBAT ARASAKU</text>
    <text class="t main" x="450" y="150">EBAT ARASAKU</text>
  </g>
</svg>
