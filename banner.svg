<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      .main {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 72px;
        font-weight: 400;
        letter-spacing: 12px;
        fill: #ffe0e0;
        filter: url(#glow);
      }
      .glitch-r {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 72px;
        font-weight: 400;
        letter-spacing: 12px;
        fill: #ff6600;
        opacity: 0;
        animation: gr 3s infinite steps(1);
      }
      .glitch-b {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 72px;
        font-weight: 400;
        letter-spacing: 12px;
        fill: #ff0055;
        opacity: 0;
        animation: gb 3s infinite steps(1) 0.12s;
      }
      .main-wrap { animation: flicker 6s infinite; }

      @keyframes flicker {
        0%,96%,100% { opacity:1; }
        96.5% { opacity:0.4; }
        97% { opacity:1; }
        98.5% { opacity:0.15; }
        99% { opacity:1; }
      }
      @keyframes gr {
        0%,84%,100% { opacity:0; transform:translate(0,0); clip-path:inset(100% 0 0 0); }
        85% { opacity:0.85; transform:translate(-4px,1px); clip-path:inset(8% 0 72% 0); }
        87% { opacity:0.85; transform:translate(4px,-1px); clip-path:inset(44% 0 34% 0); }
        89% { opacity:0.85; transform:translate(-2px,2px); clip-path:inset(68% 0 8% 0); }
        91% { opacity:0; clip-path:inset(100% 0 0 0); }
      }
      @keyframes gb {
        0%,84%,100% { opacity:0; transform:translate(0,0); clip-path:inset(100% 0 0 0); }
        85% { opacity:0.85; transform:translate(4px,-2px); clip-path:inset(22% 0 58% 0); }
        88% { opacity:0.85; transform:translate(-3px,1px); clip-path:inset(58% 0 18% 0); }
        90% { opacity:0.85; transform:translate(2px,0); clip-path:inset(78% 0 4% 0); }
        92% { opacity:0; clip-path:inset(100% 0 0 0); }
      }
      .accent { animation: lineflash 3s ease-in-out infinite; }
      @keyframes lineflash {
        0%,100% { opacity:0.35; }
        50% { opacity:1; }
      }
    </style>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="3" width="900" height="1" fill="black"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="900" height="220" fill="#080203"/>

  <!-- grid -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="90" y1="0" x2="90" y2="220" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="180" y1="0" x2="180" y2="220" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="270" y1="0" x2="270" y2="220" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="360" y1="0" x2="360" y2="220" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="220" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="540" y1="0" x2="540" y2="220" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="630" y1="0" x2="630" y2="220" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="220" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>
  <line x1="810" y1="0" x2="810" y2="220" stroke="rgba(255,0,40,0.05)" stroke-width="1"/>

  <!-- scanlines -->
  <rect width="900" height="220" fill="url(#scan)" opacity="0.15"/>

  <!-- corner brackets -->
  <polyline points="14,34 14,14 34,14" fill="none" stroke="#ff002a" stroke-width="2"/>
  <polyline points="866,14 886,14 886,34" fill="none" stroke="#ff002a" stroke-width="2"/>
  <polyline points="14,186 14,206 34,206" fill="none" stroke="#ff002a" stroke-width="2"/>
  <polyline points="866,206 886,206 886,186" fill="none" stroke="#ff002a" stroke-width="2"/>

  <!-- accent line -->
  <line class="accent" x1="260" y1="178" x2="640" y2="178" stroke="#ff002a" stroke-width="1" fill="none"/>

  <!-- text -->
  <g class="main-wrap">
    <text class="glitch-r" x="450" y="148" text-anchor="middle">EBAT ARASAKU</text>
    <text class="glitch-b" x="450" y="148" text-anchor="middle">EBAT ARASAKU</text>
    <text class="main"     x="450" y="148" text-anchor="middle">EBAT ARASAKU</text>
  </g>
</svg>
